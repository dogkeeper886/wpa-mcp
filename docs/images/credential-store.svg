<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" font-family="DejaVu Sans, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#57606a"/>
    </marker>
  </defs>
  <rect width="900" height="430" fill="#ffffff"/>

  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1f2328">Credentials by reference, not by value</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#57606a">Upload certs once; tools reference them by id — no multi-KB PEM strings in every tool call</text>

  <!-- Local machine -->
  <rect x="30" y="84" width="240" height="300" rx="8" fill="#ddf4ff" stroke="#1f6feb" stroke-width="2"/>
  <text x="50" y="110" font-size="14" font-weight="bold" fill="#0a3069">Local machine</text>
  <rect x="55" y="126" width="190" height="86" rx="6" fill="#ffffff" stroke="#54aeff"/>
  <text x="68" y="148" font-size="12.5" fill="#1f2328">client.crt</text>
  <text x="68" y="170" font-size="12.5" fill="#1f2328">client.key</text>
  <text x="68" y="192" font-size="12.5" fill="#1f2328">ca.crt</text>
  <text x="55" y="244" font-size="12.5" fill="#57606a">make upload-certs</text>
  <text x="55" y="262" font-size="12" font-style="italic" fill="#57606a">(SCP, binary-safe)</text>

  <!-- SCP arrow -->
  <line x1="270" y1="180" x2="320" y2="180" stroke="#57606a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="295" y="168" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1f2328">SCP</text>

  <!-- Container -->
  <rect x="322" y="84" width="548" height="300" rx="8" fill="#dafbe1" stroke="#1a7f37" stroke-width="2"/>
  <text x="342" y="110" font-size="14" font-weight="bold" fill="#0a3622">Container (WiFi client)</text>

  <rect x="342" y="126" width="180" height="86" rx="6" fill="#ffffff" stroke="#4ac26b"/>
  <text x="354" y="146" font-size="12.5" font-weight="bold" fill="#1f2328">/tmp/certs/</text>
  <text x="354" y="166" font-size="12" fill="#57606a">client.crt</text>
  <text x="354" y="183" font-size="12" fill="#57606a">client.key</text>
  <text x="354" y="200" font-size="12" fill="#57606a">ca.crt</text>

  <line x1="522" y1="168" x2="566" y2="168" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="568" y="126" width="284" height="86" rx="6" fill="#ffffff" stroke="#4ac26b"/>
  <text x="582" y="146" font-size="12.5" font-weight="bold" fill="#1f2328">credential_store (MCP tool)</text>
  <text x="582" y="167" font-size="12" fill="#57606a">reads paths, validates with openssl,</text>
  <text x="582" y="184" font-size="12" fill="#57606a">copies into the permanent store</text>
  <text x="582" y="201" font-size="12" fill="#57606a">store / get / list / delete</text>

  <line x1="710" y1="212" x2="710" y2="244" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="430" y="248" width="422" height="80" rx="6" fill="#ffffff" stroke="#1a7f37"/>
  <text x="446" y="270" font-size="12.5" font-weight="bold" fill="#1f2328">~/.config/wpa-mcp/credentials/&lt;id&gt;/</text>
  <text x="446" y="290" font-size="12" fill="#57606a">client.crt · client.key (0600) · ca.crt · meta.json</text>
  <text x="446" y="312" font-size="12" font-style="italic" fill="#1a7f37">Docker named volume — survives container restart</text>

  <!-- reuse -->
  <line x1="430" y1="288" x2="352" y2="288" stroke="#57606a" stroke-width="1.6" stroke-dasharray="4 3"/>
  <rect x="342" y="248" width="80" height="80" rx="6" fill="#fff8c5" stroke="#9a6700"/>
  <text x="382" y="280" text-anchor="middle" font-size="11.5" fill="#1f2328">wifi_connect</text>
  <text x="382" y="296" text-anchor="middle" font-size="11.5" fill="#1f2328">_tls(id)</text>

  <text x="450" y="364" text-anchor="middle" font-size="11.5" font-style="italic" fill="#57606a">Baked certs under certs/ are imported the same way at container start.</text>
</svg>
