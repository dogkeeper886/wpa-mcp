<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" font-family="DejaVu Sans, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#57606a"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="#ffffff"/>

  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1f2328">Two MCP servers behind one port</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#57606a">Express fronts the in-process wpa-mcp and a proxied Playwright MCP that shares the container's netns</text>

  <!-- Host / client -->
  <rect x="300" y="78" width="300" height="50" rx="6" fill="#ddf4ff" stroke="#1f6feb" stroke-width="2"/>
  <text x="450" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#0a3069">MCP Client (Claude Code / Desktop)</text>
  <text x="450" y="118" text-anchor="middle" font-size="12" fill="#57606a">sees two servers: wpa-mcp, wpa-playwright</text>

  <line x1="450" y1="128" x2="450" y2="158" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="560" y="148" text-anchor="middle" font-size="12" fill="#57606a">HTTP POST/GET/DELETE :3000</text>

  <!-- Container outer -->
  <rect x="40" y="162" width="820" height="372" rx="8" fill="#f6f8fa" stroke="#1a7f37" stroke-width="2"/>
  <text x="60" y="186" font-size="14" font-weight="bold" fill="#0a3622">CONTAINER</text>

  <!-- express -->
  <rect x="330" y="172" width="240" height="42" rx="6" fill="#ffffff" stroke="#1a7f37"/>
  <text x="450" y="198" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f2328">express on :3000</text>

  <!-- three endpoints -->
  <line x1="450" y1="214" x2="170" y2="252" stroke="#57606a" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="450" y1="214" x2="450" y2="252" stroke="#57606a" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="450" y1="214" x2="730" y2="252" stroke="#57606a" stroke-width="1.8" marker-end="url(#arrow)"/>

  <rect x="70" y="256" width="200" height="64" rx="6" fill="#dafbe1" stroke="#1a7f37"/>
  <text x="170" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2328">/mcp</text>
  <text x="170" y="299" text-anchor="middle" font-size="11.5" fill="#57606a">in-process · stateless</text>
  <text x="170" y="314" text-anchor="middle" font-size="11.5" fill="#57606a">wifi_* credential_* network_*</text>

  <rect x="350" y="256" width="200" height="64" rx="6" fill="#fff8c5" stroke="#9a6700"/>
  <text x="450" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2328">/playwright-mcp</text>
  <text x="450" y="299" text-anchor="middle" font-size="11.5" fill="#57606a">reverse proxy · stateful</text>
  <text x="450" y="314" text-anchor="middle" font-size="11.5" fill="#57606a">Mcp-Session-Id round-tripped</text>

  <rect x="630" y="256" width="200" height="64" rx="6" fill="#eaeef2" stroke="#57606a"/>
  <text x="730" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2328">/health</text>
  <text x="730" y="299" text-anchor="middle" font-size="11.5" fill="#57606a">in-process</text>

  <!-- proxy chain down -->
  <line x1="450" y1="320" x2="450" y2="352" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="600" y="340" text-anchor="middle" font-size="11.5" fill="#57606a">http://127.0.0.1:8931 (loopback only)</text>

  <rect x="320" y="356" width="260" height="46" rx="6" fill="#ffffff" stroke="#9a6700"/>
  <text x="450" y="380" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2328">@playwright/mcp subprocess</text>
  <text x="450" y="396" text-anchor="middle" font-size="11.5" fill="#57606a">not exposed externally</text>

  <line x1="450" y1="402" x2="450" y2="430" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="340" y="434" width="220" height="42" rx="6" fill="#ffffff" stroke="#57606a"/>
  <text x="450" y="460" text-anchor="middle" font-size="13" fill="#1f2328">headless Chromium</text>

  <line x1="450" y1="476" x2="450" y2="500" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="330" y="502" width="240" height="24" rx="4" fill="#dafbe1" stroke="#1a7f37"/>
  <text x="450" y="519" text-anchor="middle" font-size="12.5" fill="#1f2328">wlan0 → joined WLAN (container netns)</text>

  <text x="730" y="470" text-anchor="middle" font-size="11.5" font-style="italic" fill="#57606a">Browser shares the WiFi netns, so it</text>
  <text x="730" y="486" text-anchor="middle" font-size="11.5" font-style="italic" fill="#57606a">reaches captive portals on the joined WLAN.</text>
</svg>
